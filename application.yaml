apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: demo-app
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/UIshfaq/gitops-demo.git
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true       # supprime du cluster ce qui disparait de Git
      selfHeal: true    # realigne le cluster si modif manuelle
    syncOptions:
      - CreateNamespace=true